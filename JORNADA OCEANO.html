<title>Jornada de Integração — Igreja Oceano da Graça</title>

<meta property="og:title" content="Jornada de Integração — Igreja Oceano da Graça">
<meta property="og:description" content="Mapa interativo: quem faz o quê em cada caminho de integração, até a entrada no pequeno grupo.">
<meta property="og:locale" content="pt_BR">

<link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    /* --- cor (tokens semânticos) --- */
    --bg:#fbfaf8;
    --surface:#ffffff;
    --surface-hover:#fcfbf9;
    --ink:#211f1a;
    --ink-soft:#54504a;
    --muted:#6b665c;
    --faint:#b6b1a6;
    --hairline:#ebe7df;
    --hairline-strong:#ddd8cc;
    --accent:#5a5650;
    --accent-ink:#54504a;
    --accent-soft:#f1eee8;
    --accent-ring:rgba(90,86,80,.3);
    /* --- elevação --- */
    --sh-1:0 1px 2px rgba(33,31,26,.04);
    --sh-2:0 2px 4px rgba(33,31,26,.04), 0 6px 16px rgba(33,31,26,.06);
    --sh-3:0 4px 8px rgba(33,31,26,.05), 0 16px 40px rgba(33,31,26,.09);
    /* --- raio --- */
    --r-sm:8px; --r-md:12px; --r-lg:16px; --r-pill:999px;
    /* --- espaço (escala 4px) --- */
    --s1:4px; --s2:8px; --s3:12px; --s4:16px; --s5:24px; --s6:32px; --s7:48px; --s8:72px;
    /* --- motion tokens --- */
    --ease:cubic-bezier(.2,.8,.2,1);
    --ease-in-out:cubic-bezier(.45,0,.2,1);
    --dur-micro:180ms;
    --dur-open:280ms;
    --dur-enter:400ms;
  }
  /* a cor de cada etapa vem de --ac / --ac-soft / --ac-ring, definidos inline por papel */
  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    margin:0; color:var(--ink); background:var(--bg);
    font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    line-height:1.6; -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
  }
  .wrap{max-width:620px; margin:0 auto; padding:var(--s8) var(--s5) 96px;}

  /* ---------- hero (centralizado) ---------- */
  .hero{text-align:center;}
  .eyebrow{
    display:inline-flex; align-items:center; gap:var(--s2);
    font-size:12px; letter-spacing:.15em; text-transform:uppercase;
    color:var(--accent-ink); font-weight:600; margin:0 0 var(--s4);
    padding:6px 14px; border-radius:var(--r-pill);
    background:var(--accent-soft);
    transition:color var(--dur-open) var(--ease), background var(--dur-open) var(--ease);
  }
  .symbol{height:14px; width:auto; display:block; opacity:.85;}
  h1{
    font-family:'Newsreader',Georgia,serif; font-weight:500;
    font-size:clamp(34px,6.5vw,50px); line-height:1.06; letter-spacing:-.015em;
    margin:0 0 var(--s4); color:var(--ink);
  }
  .sub{color:var(--ink-soft); font-size:17px; margin:0 auto; max-width:48ch; line-height:1.6;}

  /* ---------- segmented control (pílula deslizante) ---------- */
  .seg{
    position:relative; display:grid; grid-auto-flow:column; grid-auto-columns:1fr;
    gap:0; margin:var(--s7) 0 0; padding:5px;
    background:var(--surface); border:1px solid var(--hairline);
    border-radius:var(--r-pill); box-shadow:var(--sh-1);
  }
  .seg-pill{
    position:absolute; top:5px; bottom:5px; left:5px;
    border-radius:var(--r-pill); background:var(--accent);
    box-shadow:var(--sh-2);
    transition:transform var(--dur-open) var(--ease), width var(--dur-open) var(--ease), background var(--dur-open) var(--ease);
    z-index:0;
  }
  .tab{
    position:relative; z-index:1; appearance:none; border:0; background:none;
    cursor:pointer; font-family:inherit; font-size:14.5px; font-weight:500;
    color:var(--muted); padding:11px 8px; border-radius:var(--r-pill);
    transition:color var(--dur-micro) var(--ease);
    white-space:nowrap;
  }
  .tab:hover{color:var(--ink-soft);}
  .tab.on{color:#fff;}
  .tab:focus-visible{outline:none; box-shadow:0 0 0 3px var(--accent-ring); border-radius:var(--r-pill);}

  /* ---------- trilha ---------- */
  .journey{position:relative; margin-top:var(--s6);}

  .node{
    display:block; width:100%; text-align:left; border:0; background:none;
    cursor:pointer; font-family:inherit; color:inherit; padding:0 0 var(--s3);
    position:relative; padding-left:52px;
    opacity:0; transform:translateY(8px);
    animation:enter var(--dur-enter) var(--ease) forwards;
  }
  @keyframes enter{to{opacity:1; transform:translateY(0);}}
  .node::before{
    content:''; position:absolute; left:17px; top:0; bottom:0; width:2px;
    background:var(--hairline-strong);
  }
  .node:first-child::before{top:24px;}
  .node:last-child::before{height:24px; bottom:auto;}

  .num{
    position:absolute; left:0; top:14px; width:36px; height:36px; border-radius:var(--r-pill);
    background:var(--ac-soft,var(--surface)); border:1.5px solid var(--ac,var(--hairline-strong));
    display:flex; align-items:center; justify-content:center;
    font-size:14px; font-weight:600; color:var(--ac,var(--muted));
    transition:border-color var(--dur-micro) var(--ease), color var(--dur-micro) var(--ease),
               background var(--dur-micro) var(--ease), transform var(--dur-micro) var(--ease),
               box-shadow var(--dur-micro) var(--ease);
    z-index:1;
  }

  .card{
    position:relative; overflow:hidden;
    background:var(--surface); border:1px solid var(--hairline);
    border-radius:var(--r-lg); padding:var(--s4) var(--s5);
    box-shadow:var(--sh-1);
    transition:box-shadow var(--dur-micro) var(--ease), border-color var(--dur-micro) var(--ease),
               transform var(--dur-micro) var(--ease);
  }
  /* faixa de cor do papel na borda esquerda do card */
  .card::before{
    content:''; position:absolute; left:0; top:0; bottom:0; width:4px;
    background:var(--ac,var(--hairline-strong));
  }
  /* HOVER: leve elevação — propósito: indicar que o item é clicável */
  .node:hover .card{box-shadow:var(--sh-2); border-color:var(--ac,var(--hairline-strong)); transform:translateY(-1px);}
  .node:hover .num{background:var(--ac,var(--surface)); color:#fff;}
  /* FOCUS: anel acessível para teclado */
  .node:focus-visible{outline:none;}
  .node:focus-visible .card{box-shadow:0 0 0 3px var(--ac-ring,var(--accent-ring)); border-color:var(--ac,var(--accent));}
  /* ACTIVE/EXPANDED: card destacado, número preenchido */
  .node.active .card{box-shadow:var(--sh-3); border-color:var(--ac,var(--accent));}
  .node.active .num{background:var(--ac,var(--accent)); border-color:var(--ac,var(--accent)); color:#fff; box-shadow:0 0 0 4px var(--ac-soft,var(--accent-soft));}

  .head{display:flex; align-items:flex-start; gap:var(--s3);}
  .role{font-family:'Newsreader',serif; font-size:20px; font-weight:600; color:var(--ink); line-height:1.22; letter-spacing:-.01em;}
  .act{font-size:14px; color:var(--muted); margin-top:var(--s1); line-height:1.5;}
  .plus{
    margin-left:auto; flex-shrink:0; width:24px; height:24px; position:relative;
    align-self:center;
  }
  .plus::before, .plus::after{
    content:''; position:absolute; top:50%; left:50%; background:var(--faint);
    transform:translate(-50%,-50%); transition:transform var(--dur-open) var(--ease), background var(--dur-micro) var(--ease);
  }
  .plus::before{width:13px; height:1.5px;}
  .plus::after{width:1.5px; height:13px;}
  .node:hover .plus::before, .node:hover .plus::after{background:var(--ink-soft);}
  .node.active .plus::before, .node.active .plus::after{background:var(--ac,var(--accent));}
  /* + vira × ao expandir */
  .node.active .plus::after{transform:translate(-50%,-50%) rotate(90deg) scaleY(0);}
  .node.active .plus::before{transform:translate(-50%,-50%) rotate(180deg);}

  .reveal{
    display:grid; grid-template-rows:0fr;
    transition:grid-template-rows var(--dur-open) var(--ease);
  }
  .node.active .reveal{grid-template-rows:1fr;}
  .reveal>div{overflow:hidden; min-height:0;}
  .det{margin:0; padding:0; list-style:none;}
  .det-wrap{padding-top:var(--s4); margin-top:var(--s4); border-top:1px solid var(--hairline);}
  .det li{
    font-size:14.5px; line-height:1.55; color:var(--ink-soft);
    padding:var(--s2) 0 var(--s2) var(--s5); position:relative;
  }
  .det li+li{border-top:1px solid var(--hairline);}
  .det li::before{
    content:''; position:absolute; left:5px; top:14px; width:6px; height:6px;
    border-radius:var(--r-pill); background:var(--ac,var(--accent)); opacity:.9;
  }

  .site-foot{
    margin-top:var(--s8); padding-top:var(--s6);
    border-top:1px solid var(--hairline); text-align:center;
  }
  .site-foot .logo{
    height:54px; width:auto; display:block; margin:0 auto var(--s4);
    opacity:.9;
  }
  .seal{
    margin:0; font-family:'Newsreader',serif; font-style:italic;
    font-size:16px; color:var(--ink-soft); letter-spacing:.01em;
  }

  @media (max-width:480px){
    .wrap{padding:var(--s7) var(--s4) var(--s8);}
    .card{padding:var(--s4);}
    .tab{font-size:13.5px; padding:11px 4px;}
  }
  @media (prefers-reduced-motion: reduce){
    *{animation:none !important; transition:none !important;}
    .node{opacity:1; transform:none;}
    html{scroll-behavior:auto;}
  }
</style>
</head>

var palette = {
  acolhe: {ac:'#4f7a64', soft:'#eef4ef', ring:'rgba(79,122,100,.32)'},   /* verde-salva */
  sec:    {ac:'#3f7392', soft:'#eaf1f5', ring:'rgba(63,115,146,.32)'},   /* azul-petróleo */
  past:   {ac:'#a55f4e', soft:'#f6ece8', ring:'rgba(165,95,78,.32)'},    /* terracota */
  secpg:  {ac:'#746a9e', soft:'#f1eef7', ring:'rgba(116,106,158,.32)'},  /* lilás */
  lider:  {ac:'#9a6537', soft:'#f8efe5', ring:'rgba(154,101,55,.32)'}    /* âmbar */
};
function movePill(k){
  var pill = document.getElementById('segpill');
  var btn = document.getElementById('t-'+k);
  pill.style.width = btn.offsetWidth + 'px';
  pill.style.transform = 'translateX(' + (btn.offsetLeft - 5) + 'px)';
}
function pick(k){
  current = k;
  ids.forEach(function(id){
    var b = document.getElementById('t-'+id);
    var on = id===k;
    b.classList.toggle('on', on);
    b.setAttribute('aria-pressed', on ? 'true' : 'false');
  });
  movePill(k);
  var steps = flows[k];
  var journeyColor = {vis:'#0a5c86', con:'#8a6212', mem:'#157a4b'};
  document.getElementById('segpill').style.background = journeyColor[k] || '#5a5650';
  document.getElementById('journey').innerHTML = steps.map(function(s,idx){
    var delay = (idx*0.06).toFixed(2);
    var p = palette[s.c] || {ac:'#5a5650', soft:'#f1eee8', ring:'rgba(90,86,80,.3)'};
    var vars = '--ac:'+p.ac+';--ac-soft:'+p.soft+';--ac-ring:'+p.ring+';';
    var items = s.det.map(function(t){return '<li>'+t+'</li>';}).join('');
    return '<div class="node" role="button" tabindex="0" style="'+vars+'animation-delay:'+delay+'s"'
      + ' aria-expanded="false" onclick="toggleNode(this)"'
      + ' onkeydown="if(event.key===\'Enter\'||event.key===\' \'){event.preventDefault();toggleNode(this);}">'
      + '<span class="num" aria-hidden="true">'+(idx+1)+'</span>'
      + '<div class="card">'
      +   '<div class="head">'
      +     '<div style="flex:1"><div class="role">'+s.role+'</div>'
      +     '<div class="act">'+s.act+'</div></div>'
      +     '<span class="plus" aria-hidden="true"></span>'
      +   '</div>'
      +   '<div class="reveal"><div><div class="det-wrap"><ul class="det">'+items+'</ul></div></div></div>'
      + '</div>'
      + '</div>';
  }).join('');
}
function toggleNode(el){
  var open = el.classList.toggle('active');
  el.setAttribute('aria-expanded', open ? 'true' : 'false');
}
window.addEventListener('resize', function(){ movePill(current); });
window.addEventListener('load', function(){ movePill('vis'); });
pick('vis');
movePill('vis');
</script>
</body>
</html>
